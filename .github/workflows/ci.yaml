name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: SSH and deploy
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        echo "$SSH_PRIVATE_KEY" > keyfile.pem
        chmod 700 keyfile.pem
        ssh -o StrictHostKeyChecking=no -i keyfile.pem ubuntu@ec2-13-213-46-96.ap-southeast-1.compute.amazonaws.com'
          cd staff-management-3 &&
          sudo pm2 delete all || true &&
          git pull origin main &&
          pm2 start dist/server.js --name email-scanner-server
        '
        rm keyfile.pem